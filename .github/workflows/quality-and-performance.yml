name: Quality and Performance Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-and-performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Performance Gate
        run: npm run perf
